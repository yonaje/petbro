resolver 10.96.0.10 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/auth/ {
        set $auth_upstream authservice.petbro.svc.cluster.local:8080;
        rewrite ^/api/auth/(.*)$ /$1 break;
        proxy_pass http://$auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/user/ {
        set $user_upstream userservice.petbro.svc.cluster.local:8081;
        rewrite ^/api/user/(.*)$ /$1 break;
        proxy_pass http://$user_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/friend/ {
        set $friend_upstream friendservice.petbro.svc.cluster.local:8082;
        rewrite ^/api/friend/(.*)$ /$1 break;
        proxy_pass http://$friend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
