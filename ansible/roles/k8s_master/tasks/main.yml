- name: Check if Kubernetes master is initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Initialize Kubernetes master
  command: kubeadm init --apiserver-advertise-address={{ ansible_host }} --pod-network-cidr={{ pod_network_cidr }} --service-cidr={{ service_network_cidr }}
  when: not kubeadm_admin_conf.stat.exists

- name: Configure kubelet cluster DNS
  replace:
    path: /var/lib/kubelet/config.yaml
    regexp: '(?m)^clusterDNS:\n- .*$'
    replace: |-
      clusterDNS:
      - {{ cluster_dns_ip }}
  register: kubelet_cluster_dns

- name: Restart kubelet after cluster DNS change
  systemd:
    name: kubelet
    state: restarted
  when: kubelet_cluster_dns.changed

- name: Create kubeconfig directory for VM user
  file:
    path: "/home/{{ vm_user }}/.kube"
    state: directory
    owner: "{{ vm_user }}"
    group: "{{ vm_user }}"
    mode: "0755"

- name: Copy admin kubeconfig for VM user
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ vm_user }}/.kube/config"
    remote_src: true
    owner: "{{ vm_user }}"
    group: "{{ vm_user }}"
    mode: "0600"

- name: Generate worker join command
  command: kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false

- name: Save worker join command on the Ansible control host
  delegate_to: localhost
  become: false
  copy:
    dest: "{{ join_command_path }}"
    mode: "0600"
    content: "{{ kubeadm_join_command.stdout }}\n"
