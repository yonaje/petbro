apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  namespace: petbro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      containers:
        - name: userservice
          image: petbro-userservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SERVICE_NAME
              value: userservice
            - name: SERVICE_PORT
              value: "8081"
            - name: APP_ENV
              value: prod
            - name: APP_VERSION
              value: "1.0.0"
            - name: LOG_LEVEL
              value: info
            - name: LOG_FORMAT
              value: json
            - name: LOG_OUTPUT
              value: stdout
            - name: LOG_FILE_PATH
              value: /tmp/userservice.log
            - name: LOG_ERROR_FILE_PATH
              value: /tmp/userservice-error.log
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: user_service
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
