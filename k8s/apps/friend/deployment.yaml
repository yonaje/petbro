apiVersion: apps/v1
kind: Deployment
metadata:
  name: friendservice
  namespace: petbro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: friendservice
  template:
    metadata:
      labels:
        app: friendservice
    spec:
      containers:
        - name: friendservice
          image: petbro-friendservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SERVICE_NAME
              value: friendservice
            - name: SERVICE_PORT
              value: "8082"
            - name: APP_ENV
              value: prod
            - name: APP_VERSION
              value: "1.0.0"
            - name: LOG_LEVEL
              value: info
            - name: LOG_FORMAT
              value: json
            - name: LOG_OUTPUT
              value: stdout
            - name: LOG_FILE_PATH
              value: /tmp/friendservice.log
            - name: LOG_ERROR_FILE_PATH
              value: /tmp/friendservice-error.log
            - name: USER_SERVICE_BASE_URL
              value: http://userservice:8081
            - name: NEO4J_URI
              value: neo4j://neo4j:7687
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secrets
                  key: JWT_SECRET
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: NEO4J_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
