  - databases/neo4j/network-policy.yaml

  - apps/auth/service.yaml
  - apps/auth/deployment.yaml
  - apps/auth/network-policy.yaml

  - apps/user/service.yaml
  - apps/user/deployment.yaml
  - apps/user/network-policy.yaml

  - apps/friend/service.yaml
  - apps/friend/deployment.yaml
  - apps/friend/network-policy.yaml

  - apps/frontend/service.yaml
  - apps/frontend/deployment.yaml
  - apps/frontend/network-policy.yaml

