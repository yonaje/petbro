apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - core/namespace.yaml

  - core/secrets/grafana.yaml
  - core/secrets/jwt.yaml
  - core/secrets/neo4j.yaml
  - core/secrets/postgres.yaml

  - network/default-deny-all.yaml
  - network/allow-dns-egress.yaml

  - databases/postgres/configmap.yaml
  - databases/postgres/service.yaml
  - databases/postgres/statefulset.yaml
  - databases/postgres/network-policy.yaml

  - databases/neo4j/service.yaml
